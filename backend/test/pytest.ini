# pytest.ini  — put this in your project root (same level as /tests)

[pytest]
# Where pytest looks for tests
testpaths = tests

# Show short test IDs, colour output, and print any print() statements
addopts = -v --tb=short -p no:warnings

# Treat these markers as valid (stops pytest from warning about unknown marks)
markers =
    auth: tests for authentication endpoints
    user: tests for user-facing endpoints
    admin: tests for admin endpoints
